<!doctype html>
<html lang="vi">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Đang quay về Sellio…</title>
    <meta name="description" content="Hoàn tất Stripe onboarding và quay về ứng dụng Sellio." />
    <meta name="theme-color" content="#080b12" />
    <style>
      :root {
        color-scheme: dark;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      * { box-sizing: border-box; }
      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 24px;
        color: #f8fafc;
        background:
          radial-gradient(circle at 20% 10%, rgba(70, 242, 179, .22), transparent 30rem),
          radial-gradient(circle at 90% 20%, rgba(88, 215, 255, .20), transparent 32rem),
          linear-gradient(135deg, #080b12, #101827 60%, #070a10);
      }
      main {
        width: min(560px, 100%);
        border: 1px solid rgba(255,255,255,.14);
        border-radius: 32px;
        padding: 34px;
        background: linear-gradient(180deg, rgba(255,255,255,.12), rgba(255,255,255,.05));
        box-shadow: 0 28px 90px rgba(0,0,0,.42);
        backdrop-filter: blur(22px);
        text-align: center;
      }
      .logo {
        width: 64px;
        height: 64px;
        margin: 0 auto 18px;
        display: grid;
        place-items: center;
        border-radius: 22px;
        color: #03110c;
        font-size: 1.6rem;
        font-weight: 900;
        background: linear-gradient(135deg, #46f2b3, #58d7ff);
        box-shadow: 0 18px 50px rgba(70, 242, 179, .28);
      }
      h1 {
        margin: 0;
        font-size: clamp(2rem, 7vw, 3.4rem);
        line-height: .98;
        letter-spacing: -.06em;
      }
      p {
        margin: 18px 0 26px;
        color: #a7b0c0;
        line-height: 1.7;
      }
      a {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 52px;
        padding: 0 20px;
        border-radius: 18px;
        color: #06100d;
        background: linear-gradient(135deg, #46f2b3, #58d7ff);
        font-weight: 850;
        text-decoration: none;
      }
      small {
        display: block;
        margin-top: 16px;
        color: #7f8a9d;
      }
    </style>
  </head>
  <body>
    <main>
      <div class="logo">S</div>
      <h1>Hoàn tất Stripe</h1>
      <p>Sellio đang mở lại ứng dụng để cập nhật trạng thái payout của bạn. Nếu trình duyệt không tự chuyển, hãy bấm nút bên dưới.</p>
      <a id="open-app" href="sellio://stripe/return">Quay về Sellio</a>
      <small>Bạn có thể đóng trang này sau khi ứng dụng đã mở.</small>
    </main>
    <script>
      const params = window.location.search || '';
      const appUrl = `sellio://stripe/return${params}`;
      const button = document.getElementById('open-app');
      button.href = appUrl;
      window.setTimeout(() => {
        window.location.assign(appUrl);
      }, 250);
    </script>
  </body>
</html>
